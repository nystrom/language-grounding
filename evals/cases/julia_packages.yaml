# Evals for julia/packages skill
# Tests that an agent uses Pkg programmatic API correctly and never
# manually writes UUIDs or edits Manifest.toml.
#
# Skills exercised: julia/packages

cases:

  - id: jl.pkg.add_pkg_not_uuid
    skill: julia/packages
    topic: pkg_add
    prompt: >
      How should a developer add the DataFrames package to their Julia project?
    expected_behavior:
      must_not_say:
        - "edit Project.toml"
        - "write the UUID"
        - "manually add to [deps]"
        - "copy the UUID from"
      must_say_one_of:
        - "Pkg.add(\"DataFrames\")"
        - "] add DataFrames"
        - "Pkg.add"

  - id: jl.pkg.never_write_uuid
    skill: julia/packages
    topic: uuid_rule
    prompt: >
      A developer wants to add JSON3.jl as a dependency. They propose editing Project.toml
      directly and adding `JSON3 = "0f8b85d8-..."` under [deps]. Is this correct?
    expected_behavior:
      must_not_say:
        - "yes, that is correct"
        - "editing Project.toml directly is fine"
        - "you can write the UUID manually"
      must_say_one_of:
        - "Pkg.add"
        - "never write UUIDs manually"
        - "UUID must come from the registry"
        - "] add JSON3"

  - id: jl.pkg.instantiate_from_manifest
    skill: julia/packages
    topic: reproducible_install
    prompt: >
      After cloning a Julia project repository, what is the correct sequence of commands
      to install all dependencies at the exact pinned versions?
    expected_behavior:
      must_say_one_of:
        - "Pkg.activate(\".\")"
        - "] activate ."
        - "Pkg.instantiate()"
        - "] instantiate"

  - id: jl.pkg.never_edit_manifest
    skill: julia/packages
    topic: manifest_rule
    prompt: >
      Should developers ever manually edit Manifest.toml?
    expected_behavior:
      must_not_say:
        - "yes, you can edit Manifest.toml"
        - "editing Manifest.toml is fine"
        - "safe to modify"
      must_say_one_of:
        - "never edit manually"
        - "automatically managed by Pkg"
        - "do not edit"
        - "generated by Pkg"

  - id: jl.pkg.compat_syntax
    skill: julia/packages
    topic: compat_bounds
    prompt: >
      In a Julia Project.toml `[compat]` section, what does the entry `DataFrames = "1"` mean?
    choices:
      - "Exactly version 1.0.0"
      - "Version >= 1.0.0 and < 2.0.0"
      - "Version >= 1.0.0 with no upper bound"
      - "The latest version of DataFrames"
    expected_output: ">= 1.0.0 and < 2.0.0"
    wrong_output_reason: >
      "Exactly version 1.0.0" or "no upper bound" — Julia compat entries use caret
      semantics. "1" means >=1.0.0, <2.0.0. This allows any compatible 1.x release
      but blocks 2.0 which may have breaking changes.

  - id: jl.pkg.develop_local
    skill: julia/packages
    topic: pkg_develop
    prompt: >
      How do you make a locally checked-out Julia package available in your project
      so that edits to the source are immediately reflected?
    expected_behavior:
      must_say_one_of:
        - "Pkg.develop(path="
        - "] develop"
        - "Pkg.develop"

  - id: jl.pkg.activate_before_add
    skill: julia/packages
    topic: environments
    prompt: >
      A developer runs `Pkg.add("CSV")` but it installs into the global environment
      instead of their project. What step did they miss?
    expected_behavior:
      must_say_one_of:
        - "Pkg.activate(\".\")"
        - "] activate ."
        - "activate the project environment first"
        - "activate before adding"
