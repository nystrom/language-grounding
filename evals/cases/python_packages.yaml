# Evals for python/packages skill
# Tests that an agent knows pip, venv, uv, pyproject.toml, and version specifier semantics.
#
# Skills exercised: python/packages

cases:

  - id: py.pkg.venv_activate
    skill: python/packages
    topic: venv
    prompt: >
      After running `python -m venv .venv` on macOS, what command activates the environment?
    choices:
      - "source .venv/bin/activate"
      - ".venv/bin/activate"
      - "activate .venv"
      - ".venv\\Scripts\\activate"
    expected_output: "source .venv/bin/activate"
    wrong_output_reason: >
      ".venv\\Scripts\\activate" is Windows. On macOS/Linux the activate script must
      be sourced: `source .venv/bin/activate`. Just running the script without source
      would not affect the current shell's PATH.

  - id: py.pkg.editable_install
    skill: python/packages
    topic: editable_install
    prompt: >
      What does `pip install -e .` do, and when would you use it?
    expected_behavior:
      must_say_one_of:
        - "editable install"
        - "development mode"
        - "changes to source are immediately reflected"
        - "without reinstalling"

  - id: py.pkg.caret_compat
    skill: python/packages
    topic: version_specifiers
    prompt: >
      In a pyproject.toml dependency, what does `~=1.4` mean?
    choices:
      - "Exactly version 1.4"
      - ">= 1.4, < 2.0"
      - ">= 1.4, < 1.5"
      - ">= 1.4 with no upper bound"
    expected_output: ">= 1.4, < 2.0"
    wrong_output_reason: >
      "Exactly version 1.4" or ">= 1.4 with no upper bound" — the compatible release
      specifier ~=1.4 means >=1.4, ==1.* which is equivalent to >=1.4, <2.0.
      ~=1.4.2 would mean >=1.4.2, <1.5.

  - id: py.pkg.pyproject_deps
    skill: python/packages
    topic: pyproject_toml
    prompt: >
      Where should runtime dependencies be declared in a modern Python project using pyproject.toml?
    expected_behavior:
      must_say_one_of:
        - "[project]"
        - "dependencies ="
        - "project.dependencies"

  - id: py.pkg.pip_freeze_vs_requirements
    skill: python/packages
    topic: requirements
    prompt: >
      What is the difference between listing `requests>=2.28` in requirements.txt
      versus `requests==2.31.0`?
    expected_behavior:
      must_say_one_of:
        - "pinned"
        - "exact version"
        - "reproducible"
        - "allows updates"
        - "constraint"

  - id: py.pkg.system_python_danger
    skill: python/packages
    topic: venv
    prompt: >
      Why is it a bad practice to run `pip install requests` without first activating
      a virtual environment?
    expected_behavior:
      must_say_one_of:
        - "system Python"
        - "global environment"
        - "version conflicts"
        - "pollutes"
        - "affects all projects"
